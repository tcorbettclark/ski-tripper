name: Bun CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: test-app
    runs-on: ubuntu-latest
    env:
      BUN_TEST: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check linting and formatting
        run: bun run check
      - name: Run tests
        run: bun run test
