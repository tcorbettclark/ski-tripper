<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='16' y='26' font-size='24' font-family='system-ui' text-anchor='middle'>⛷︎</text></svg>" />
    <title>Ski Tripper — Group Ski Holiday Planner</title>
    <meta name="description" content="Ski Tripper helps your group find and agree on the perfect ski holiday. Browse thousands of resorts, pitch proposals, and vote — without the WhatsApp chaos." />
    <link rel="canonical" href="https://ski-tripper.com/" />
    <meta property="og:title" content="Ski Tripper — Group Ski Holiday Planner" />
    <meta property="og:description" content="Ski Tripper helps your group find and agree on the perfect ski holiday. Browse thousands of resorts, pitch proposals, and vote — without the WhatsApp chaos." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ski-tripper.com/" />
    <meta name="twitter:card" content="summary" />
    <link rel="stylesheet" href="/main.css" />
    <script>
      (() => {
        var t = localStorage.getItem('theme');
        var s = (t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)) ? 'dark' : 'light';
        document.documentElement.dataset.theme = s;
        var m = document.createElement('meta');
        m.name = 'color-scheme';
        m.content = s;
        document.head.appendChild(m);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
